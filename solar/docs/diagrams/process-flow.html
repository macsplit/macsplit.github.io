<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Flow Diagram</title>
  <style>
    body {
      margin: 0;
      background: #f5efe4;
      font-family: Arial, sans-serif;
    }

    .frame {
      width: 1600px;
      min-height: 900px;
      padding: 48px;
      box-sizing: border-box;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(245, 193, 93, 0.26), transparent 28%),
        linear-gradient(180deg, #faf6ed, #efe5d1);
    }

    .diagram-card {
      width: 100%;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 251, 244, 0.96);
      box-shadow: 0 24px 80px rgba(70, 48, 15, 0.12);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 34px;
      color: #2c2f25;
    }

    #diagram {
      display: grid;
      place-items: center;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="diagram-card">
      <h1>SolarSense Analytics Process Flow</h1>
      <div id="diagram"></div>
    </div>
  </div>
  <script src="./mermaid.min.js"></script>
  <script>
    const definition = `graph TD
      A[Upload daily .xlsx data] --> B[Normalize per-array time series]
      B --> C[Apply array metadata and site context]
      C --> D[Clear-sky radiation model]
      C --> E[Satellite or weather attenuation model]
      D --> F[Expected daily output]
      E --> F
      F --> G[Actual vs expected deviation analysis]
      G --> H[Fault classification and confidence scoring]
      H --> I[Health report and validation workflow]`;

    mermaid.initialize({
      startOnLoad: false,
      theme: "base",
      themeVariables: {
        primaryColor: "#f4c365",
        primaryTextColor: "#2c2f25",
        primaryBorderColor: "#b96f29",
        lineColor: "#6f5b3d",
        secondaryColor: "#f9efdd",
        tertiaryColor: "#e7f1e5",
        fontFamily: "Arial, sans-serif"
      }
    });

    mermaid.render("process-flow-svg", definition).then(({ svg }) => {
      document.getElementById("diagram").innerHTML = svg;
      document.title = "rendered";
    });
  </script>
</body>
</html>
